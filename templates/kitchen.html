<!DOCTYPE html>
<html>
    <head>
        <title>廚房出餐看板</title>
        <style>
            body { font-family: "Microsoft JhengHei", sans-serif; background-color: #1a1a1a; color: white; padding: 20px; }
            .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
            
            .order-card { background: #333; border: 2px solid #444; border-radius: 10px; padding: 15px; }
            .order-header { border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; }
            .order-id { font-size: 1.5em; color: #ffc107; }
            
            .item-list { list-style: none; padding: 0; }
            .item-list li { font-size: 1.8em; margin: 10px 0; background: #444; padding: 10px; border-radius: 5px; }
            .qty { color: #00ff00; font-weight: bold; float: right; }
            
            .btn-complete { 
                width: 100%; background: #28a745; color: white; border: none; 
                padding: 15px; font-size: 1.2em; border-radius: 5px; cursor: pointer; margin-top: 10px; 
            }
            .btn-complete:hover { background: #218838; }
            
            /* 自動重新整理提示 */
            .refresh-info { text-align: center; color: #777; margin-bottom: 20px; }
        </style>
        <meta http-equiv="refresh" content="10">
    </head>
    <body>
        <h1>👨‍🍳 廚房待出餐看板</h1>
        <div class="refresh-info">頁面每 10 秒自動更新一次</div>

        <div class="dashboard-grid">
            {% for order in orders %}
            <div class="order-card">
                <div class="order-header">
                    <span class="order-id">#{{ order.oID }}</span>
                    <span>{{ order.oTime|date:"H:i" }}</span>
                </div>
                
                <ul class="item-list">
                    {% for item in order.items.all %}
                    <li>
                        {{ item.food.fName }} 
                        <span class="qty">x {{ item.quantity }}</span>
                    </li>
                    {% endfor %}
                </ul>

                <form action="{% url 'complete_order' order.oID %}" method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn-complete">✅ 標記完成</button>
                </form>
            </div>
            {% empty %}
            <div style="font-size: 2em; color: #555;">目前沒有待處理訂單 ☕</div>
            {% endfor %}
        </div>

    </body>
</html>
