<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>忘記密碼</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }
        form {
            display: inline-block;
            text-align: left;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
        }
        button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h2>重設密碼</h2>
    <p>請輸入您的帳號或電子郵件，我們將協助您重設密碼。</p>

    <form method="post">
    {% csrf_token %}
    <div style="margin-bottom: 10px;">
        <label>帳號：</label><br>
        <input type="text" name="account" required style="width: 250px;">
    </div>
    
    <div style="margin-bottom: 10px;">
        <label>電子信箱：</label><br>
        <input type="email" name="email" required style="width: 250px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>手機號碼：</label><br>
        <input type="text" name="phone" required style="width: 250px;">
    </div>
    
    <button type="submit" style="background-color: #2196F3; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 4px;">確認</button>
    <a href="{% url 'login' %}" style="margin-left: 10px; font-size: 0.9em; color: #666; text-decoration: none;">返回登入</a>
</form>
</body>
</html>
