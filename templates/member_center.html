{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>會員中心 - 點餐系統</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        .menu-card {
            transition: transform 0.2s;
            cursor: pointer;
            text-decoration: none !important;
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                {% if message.tags == 'success' %}
                    <i class="fas fa-check-circle me-2"></i>
                {% endif %}
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
        {% endif %}
        <h2 class="text-center mb-5">會員中心</h2>
        
        <div class="row g-4 justify-content-center">
            <div class="col-md-4">
                <a href="{% url 'customer_edit' %}" class="card h-100 text-center p-4 menu-card border-0 shadow-sm">
                    <div class="card-body">
                        <i class="fas fa-user-edit fa-3x text-primary mb-3"></i>
                        <h4 class="card-title text-dark">資料修改</h4>
                        <p class="text-muted small">更新姓名、電話與基本資料</p>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'password_update' %}" class="card h-100 text-center p-4 menu-card border-0 shadow-sm">
                    <div class="card-body">
                        <i class="fas fa-key fa-3x text-warning mb-3"></i>
                        <h4 class="card-title text-dark">密碼修改</h4>
                        <p class="text-muted small">定期更換密碼保護帳號安全</p>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'order_history' %}" class="card h-100 text-center p-4 menu-card border-0 shadow-sm">
                    <div class="card-body">
                        <i class="fas fa-history fa-3x text-success mb-3"></i>
                        <h4 class="card-title text-dark">歷史訂單</h4>
                        <p class="text-muted small">查詢過去的所有訂餐紀錄</p>
                    </div>
                </a>
            </div>
        </div>

        <div class="text-center mt-5">
            <a href="{% url 'menu' %}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> 返回菜單
            </a>
        </div>
    </div>
</script>
</body>
</html>
