<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>修改密碼</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; margin-top: 50px; font-family: Arial; }
        form { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .input-group { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>設定新密碼</h2>
    <form method="post">
        {% csrf_token %}
        <div class="input-group">
            <label>新密碼：</label><br>
            <input type="password" name="new_password" required style="width: 250px;">
        </div>
        <div class="input-group">
            <label>確認新密碼：</label><br>
            <input type="password" name="confirm_password" required style="width: 250px;">
        </div>
        <button type="submit" style="background-color: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer;">儲存並重新登入</button>
    </form>
</body>
</html>
